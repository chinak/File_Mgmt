# 档案管理系统 Docker Compose 配置
# 使用方法: docker compose up -d

services:
  app:
    build: .
    container_name: archive-management
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # SQLite 数据库持久化到宿主机
      - app-data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 生产环境请修改为随机强密钥
      - JWT_SECRET=please-change-this-secret-in-production

volumes:
  app-data:
    driver: local
